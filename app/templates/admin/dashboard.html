<!DOCTYPE html>
<html>
<head>
    <title>Docxy Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"], input[type="email"] { width: 300px; padding: 8px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Docxy Admin Dashboard</h1>
    
    <h2>Create User & API Key</h2>
    <form action="/api/v1/admin/users" method="post">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="organization">Organization:</label>
            <input type="text" id="organization" name="organization">
        </div>
        <button type="submit">Create User</button>
    </form>

    <h2>Users</h2>
    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Organization</th>
                <th>Role</th>
                <th>Active</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.email }}</td>
                <td>{{ user.organization or '-' }}</td>
                <td>{{ user.role }}</td>
                <td>{{ user.is_active }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
